name: visa-passport-ai-platform

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: visa_platform
      POSTGRES_USER: visa_user
      POSTGRES_PASSWORD: visa_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks: [platform]

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    networks: [platform]

  migrate:
    image: visa-platform/migrate:local
    build:
      context: ..
      dockerfile: packages/database/Dockerfile
    restart: "no"
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://visa_user:visa_password@postgres:5432/visa_platform}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [platform]

  ocr-service:
    image: visa-platform/ocr-service:local
    build:
      context: ..
      dockerfile: apps/ocr-service/Dockerfile
    restart: unless-stopped
    init: true
    environment:
      ENVIRONMENT: development
      OCR_ALLOWED_ORIGINS: http://localhost:3000
      OCR_MAX_FILE_SIZE_MB: 15
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-local-internal-api-key-change-me}
      LOCAL_UPLOAD_DIR: /app/uploads
    ports:
      - "8001:8001"
    volumes:
      - type: bind
        source: ../${LOCAL_UPLOAD_DIR:-uploads}
        target: /app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=2)"]
      interval: 10s
      timeout: 4s
      retries: 8
      start_period: 15s
    networks: [platform]

  worker:
    image: visa-platform/worker:local
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://visa_user:visa_password@postgres:5432/visa_platform}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
      OCR_SERVICE_URL: ${DOCKER_OCR_SERVICE_URL:-http://ocr-service:8001}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-local-internal-api-key-change-me}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-change_this_32_byte_key}
      UPLOAD_PROVIDER: ${UPLOAD_PROVIDER:-local}
      LOCAL_UPLOAD_DIR: /workspace/uploads
      PASSPORT_EXTRACTION_QUEUE: passport-extraction
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      OCR_REQUEST_TIMEOUT_MS: ${OCR_REQUEST_TIMEOUT_MS:-30000}
    volumes:
      - type: bind
        source: ../${LOCAL_UPLOAD_DIR:-uploads}
        target: /workspace/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      ocr-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "process.kill(1, 0)"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks: [platform]

  web:
    image: visa-platform/web:local
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://visa_user:visa_password@postgres:5432/visa_platform}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379}
      OCR_SERVICE_URL: ${DOCKER_OCR_SERVICE_URL:-http://ocr-service:8001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-change_this_32_byte_key}
      UPLOAD_PROVIDER: ${UPLOAD_PROVIDER:-local}
      LOCAL_UPLOAD_DIR: /workspace/uploads
      UPLOAD_DIR: public/uploads
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-local-internal-api-key-change-me}
    ports:
      - "3000:3000"
    volumes:
      - type: bind
        source: ../${LOCAL_UPLOAD_DIR:-uploads}
        target: /workspace/apps/web/public/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      ocr-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 4s
      retries: 8
      start_period: 20s
    networks: [platform]

volumes:
  postgres_data:
  redis_data:

networks:
  platform:
    driver: bridge
