[build]
  base = "visa-passport-ai-platform"
  command = "corepack enable && corepack prepare pnpm@10.12.1 --activate && pnpm install --frozen-lockfile && pnpm db:generate && pnpm build:packages && pnpm --filter @visa-platform/web build"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10.12.1"
  NEXT_TELEMETRY_DISABLED = "1"
  NETLIFY_NEXT_PLUGIN_SKIP = "false"

[[plugins]]
  package = "@netlify/plugin-nextjs"
